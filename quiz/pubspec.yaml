name: quiz
description: "AI Quiz Generator - Generate quizzes from images and PDFs using AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  google_fonts: ^8.0.2
  path: ^1.9.0
  http: ^1.6.0
  flutter_riverpod: ^3.3.1
  flutter_animate: ^4.5.2
  shared_preferences: ^2.5.5
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.1
  uuid: ^4.5.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
